name: Backend CI | Core Stability

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend/**', '.github/workflows/backend.yml' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'backend/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    
    steps:
    - name: 🛰️ Checkout code
      uses: actions/checkout@v4

    - name: 🐹 Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.2'
        cache: true
        cache-dependency-path: backend/go.sum
    
    # Combined dependency download and tidy checks into one step
    - name: 📦 Dependencies & Tidy Check
      run: |
        go mod download
        go mod tidy
        git diff --exit-code

    - name: 🔍 Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        working-directory: backend
        args: --timeout=5m

    - name: 🔐 Run gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
        gosec ./...
    
    # Combined test execution and coverage output into one logical step
    - name: 🧪 Run Tests & Coverage
      env:
        DB_HOST: localhost
        DB_USER: test
        DB_PASSWORD: test
        DB_NAME: test
        DB_SSLMODE: disable
        JWT_SECRET: ci-test-secret
        Server_Port: "8080"
      run: |
        go test -v -race -covermode=atomic -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out

    - name: 📥 Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage.out
        retention-days: 7
    
    - name: 🏗️ Optimized Build
      run: go build -v -ldflags="-s -w" -o server ./cmd/main.go

    # --- DOCKER SECTION ---
    # Moved Setup and Env prep together. We only run Docker steps on "push" (merges), not on PRs.
    - name: 🐳 Setup Docker & Prepare Environment
      if: github.event_name == 'push'
      uses: docker/setup-buildx-action@v3
      
    - name: 🏷️ Lowercase Registry Owner
      if: github.event_name == 'push'
      run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_ENV

    - name: 🔑 Login to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐳 Build and Push Docker Image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ env.OWNER_LC }}/reminder-backend:latest
          ghcr.io/${{ env.OWNER_LC }}/reminder-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max