name: Frontend CI | Dashboard Stability

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: quality-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://reminder-backend-a40q.onrender.com' }}
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - name: 🛰️ Checkout code
      uses: actions/checkout@v4
    
    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔐 Security Audit
      run: npm audit --audit-level=high || true

    - name: 🏗️ TypeScript Check
      run: npm run type-check

    - name: 🧼 Run ESLint
      run: npm run lint
    
    - name: 🧪 Run Unit Tests
      run: npm test

    - name: 🚀 Build application
      run: npm run build

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏷️ Lowercase Registry Owner
      id: prep
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      env:
        OWNER: ${{ github.repository_owner }}
      run: |
        echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT

    - name: 🔑 Login to GHCR
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐳 Build and Push Docker Image
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        build-args: |
          NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
        tags: |
          ghcr.io/${{ steps.prep.outputs.owner_lc }}/reminder-frontend:latest
          ghcr.io/${{ steps.prep.outputs.owner_lc }}/reminder-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: 📥 Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: nextjs-build
        path: |
          frontend/.next
          !frontend/.next/cache
        retention-days: 7
